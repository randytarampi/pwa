plugins {
    id "org.jetbrains.kotlin.js" version "1.9.25"
    id "com.github.node-gradle.node" version "7.0.2"
}

group "serverless-kotlin-node"
version "0.0.0"

repositories {
    mavenCentral()
}

kotlin {
    js(IR) {
        moduleName = "pwa-asset-service"
        useCommonJs()
        nodejs {
            testTask {
                useMocha()
            }
        }
        binaries.executable()
    }
    
    sourceSets {
        main {
            dependencies {
                implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$kotlinx_coroutines_version"
            }
        }
        test {
            dependencies {
                implementation "org.jetbrains.kotlin:kotlin-test:$kotlin_version"
            }
        }
    }
}

node {
    download = false
}

import com.github.gradle.node.yarn.task.YarnTask

// Ensure compiled JS is copied into build/node_modules for Serverless handler
task populateNodeModules(type: Copy) {
    dependsOn "compileProductionExecutableKotlinJs"
    
    from "build/compileSync/js/main/productionExecutable/kotlin"
    into "build/node_modules"
}

assemble.dependsOn populateNodeModules

// Maintain Gradle-based execution tasks for yarn scripts
task start(type: YarnTask, dependsOn: [build]) {
    args = ["start"]
}

task deploy(type: YarnTask, dependsOn: [build]) {
    args = ["deploy"]
}

task remove(type: YarnTask) {
    args = ["remove"]
}
