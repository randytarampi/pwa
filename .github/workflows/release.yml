name: release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.actor != 'github-actions[bot]' }}
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Run `git checkout`
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout sibling me repo
        run: git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/randytarampi/me.git ../me

      - name: Setup node@24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Check for publishable changes
        id: changed
        run: |
          if [ -n "$(npx lerna changed -alp || true)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: ${{ steps.changed.outputs.has_changes == 'true' }}
        run: npx lerna version --conventional-commits --yes

      - name: Publish packages
        if: ${{ steps.changed.outputs.has_changes == 'true' }}
        run: npx lerna publish from-git --yes --provenance
