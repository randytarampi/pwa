name: CI
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24, 26]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling me repo
        run: git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/randytarampi/me.git ../me
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - run: corepack enable
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx
          key: nx-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable-cache
      - run: |
          if [ "$(npx lerna ls --since HEAD...origin/master --json)" = "[]" ]; then
            yarn test
          else
            npx lerna run test --since HEAD...origin/master
          fi
  jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build asset-service
        working-directory: packages/asset-service
        run: ./gradlew build
